<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buggy, Broken, or Breached!</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2023.11.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2023.11.1/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d0d12;
            --panel-bg: #14141c;
            --neon-green: #00ff41;
            --neon-red: #ff003c;
            --neon-cyan: #00f0ff;
            --border-color: #2a2a35;
            --text-main: #e0e0e0;
        }

        body { 
            font-family: 'Share Tech Mono', 'Courier New', monospace; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex; 
            flex-direction: column;
            align-items: center;
            gap: 20px; 
            margin: 0;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
        }

        /* Loading Screen */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); background-image: linear-gradient(rgba(0, 255, 65, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 65, 0.04) 1px, transparent 1px); background-size: 30px 30px; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease-in-out; }
        .fade-out { opacity: 0; pointer-events: none; }
        .loader-title { color: var(--neon-cyan); font-size: 2em; letter-spacing: 3px; margin-bottom: 30px; text-shadow: 0 0 15px rgba(0, 240, 255, 0.5); text-transform: uppercase; }
        .progress-box { width: 400px; border: 2px solid var(--neon-green); padding: 3px; box-shadow: 0 0 10px rgba(0, 255, 65, 0.3); }
        .progress-fill { height: 15px; background: var(--neon-green); width: 0%; animation: fillBar 10s cubic-bezier(0.1, 0.7, 0.1, 1) forwards; box-shadow: 0 0 10px rgba(0, 255, 65, 0.8); }
        .loader-log { margin-top: 15px; color: var(--neon-green); font-size: 1.1em; }
        .loader-log::after { content: "> Establishing secure link..."; animation: logSequence 6s infinite; }
        @keyframes fillBar { 0% { width: 0%; } 20% { width: 30%; } 40% { width: 45%; } 60% { width: 80%; } 95% { width: 95%; } 100% { width: 96%; } }
        @keyframes logSequence { 0% { content: "> Bypassing mainframe security..."; } 20% { content: "> Downloading Python environment..."; } 40% { content: "> Decrypting hardware protocols..."; } 60% { content: "> Compiling WebAssembly binaries..."; } 80% { content: "> Injecting Pyodide Runtime..."; } 100% { content: "> Bypassing mainframe security..."; } }

        /* Dashboard Layout */
        h1.game-title { color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 2px; margin: 10px 0; text-shadow: 0 0 10px rgba(0, 240, 255, 0.4); }
        
        /* THE FIX: 3-Column Layout */
        .container { display: flex; gap: 20px; max-width: 1300px; width: 100%; align-items: stretch; }
        .col { display: flex; flex-direction: column; gap: 20px; flex: 1; }
        
        /* Flex enabled on panels to allow internal stretching */
        .panel { 
            background: var(--panel-bg); padding: 25px; border-radius: 6px; 
            border: 1px solid var(--border-color); border-top: 3px solid var(--neon-green); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); flex: 1; 
            display: flex; flex-direction: column; 
        }
        
        /* Utility class for panels that shouldn't stretch vertically (like the Setup box) */
        .panel-fit { flex: none; }

        h3 { margin-top: 0; color: var(--neon-green); text-transform: uppercase; font-size: 1.1em; border-bottom: 1px dashed var(--border-color); padding-bottom: 10px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-grid.no-margin { margin-bottom: 0; }
        
        button { padding: 12px; cursor: pointer; border: 1px solid var(--neon-green); border-radius: 3px; background: transparent; color: var(--neon-green); font-family: inherit; font-size: 1em; text-transform: uppercase; transition: all 0.2s ease-in-out; }
        button:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px rgba(0, 255, 65, 0.4); }
        
        #btn-remove, #btn-clear { border-color: #888; color: #888; }
        #btn-remove:hover, #btn-clear:hover { background: #888; color: #000; box-shadow: none; }
        
        /* THE FIX: Pushes the run button to the absolute bottom of its container */
        .btn-success { background: rgba(0, 240, 255, 0.1); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); width: 100%; margin-top: 10px; padding: 15px; font-size: 1.1em; font-weight: bold; letter-spacing: 1px; }
        .btn-success:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px rgba(0, 240, 255, 0.6); }
        .btn-success:first-of-type { margin-top: auto; }

        .btn-success:disabled { background: transparent; color: #555; border-color: #555; cursor: not-allowed; opacity: 0.5; box-shadow: none; }
        .btn-success:disabled:hover { background: transparent; color: #555; box-shadow: none; }

        select, input { background: #000; color: var(--text-main); border: 1px solid var(--border-color); font-family: inherit; padding: 8px; border-radius: 3px; }
        select:focus, input:focus { outline: none; border-color: var(--neon-cyan); }

        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.95em; }
        .setting-row input { width: 70px; text-align: center; color: var(--neon-cyan); font-weight: bold; }
        .setting-row select { width: 95px; text-align: center; font-weight: bold; }

        /* THE FIX: Terminal uses flex: 1 to fill the entire right column */
        #terminal { background: #000; color: var(--neon-green); padding: 15px; border-radius: 4px; flex: 1; min-height: 300px; overflow-y: auto; font-size: 13px; border: 1px solid var(--border-color); border-left: 3px solid var(--neon-red); box-shadow: inset 0 0 10px rgba(0,0,0,0.8); line-height: 1.5; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }
        .py-overlay { display: none !important; }

        /* THE FIX: Listbox uses flex: 1 to fill the entire left column */
        div#move-listbox { 
            width: 100%; flex: 1; min-height: 250px; margin-bottom: 20px; padding: 10px;
            background: rgba(0, 255, 65, 0.05); border-left: 2px solid var(--neon-green);
            overflow-y: auto; display: flex; flex-direction: column; gap: 5px; box-sizing: border-box;
        }

        .list-item {
            padding: 10px 12px; background: rgba(0, 255, 65, 0.05); border: 1px solid var(--border-color);
            cursor: grab; user-select: none; transition: all 0.1s; text-transform: uppercase; color: var(--neon-green);
        }
        
        .list-item:hover { border-color: var(--neon-green); background: rgba(0, 255, 65, 0.1); }
        .list-item:active { cursor: grabbing; }

        .list-item.selected { background: rgba(0, 240, 255, 0.15); border: 1px solid var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 8px rgba(0, 240, 255, 0.2); }
        .list-item.dragging { opacity: 0.3; background: var(--neon-green); color: #000; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-title">[ SYSTEM_BOOT_SEQUENCE ]</div>
        <div class="progress-box"><div class="progress-fill"></div></div>
        <div class="loader-log"></div>
    </div>

    <h1 class="game-title">Buggy, Broken, or Breached!</h1>

    <div class="container">
        
        <div class="panel">
            <h3>[ Input_Sequence ]</h3>
            <div class="btn-grid">
                <button id="btn-forward">Forward</button>
                <button id="btn-back">Back</button>
                <button id="btn-left">Left</button>
                <button id="btn-right">Right</button>
            </div>
            
            <div id="move-listbox"></div>
            
            <div class="btn-grid no-margin">
                <button id="btn-remove">Delete Selected</button>
                <button id="btn-clear">Clear All</button>
            </div>
        </div>

        <div class="col">
            <div class="panel">
                <h3>[ Config_Parameters ]</h3>
                <div class="setting-row"><span>Forward Speed:</span><input type="number" id="fwd_spd" value="100"></div>
                <div class="setting-row"><span>Right Speed:</span><input type="number" id="rgt_spd" value="10"></div>
                <div class="setting-row"><span>Right Angle:</span><input type="number" id="rgt_ang" value="90"></div>
                <div class="setting-row"><span>Left Speed:</span><input type="number" id="lft_spd" value="10"></div>
                <div class="setting-row"><span>Left Angle:</span><input type="number" id="lft_ang" value="-90"></div>
                <div class="setting-row"><span>Backward Speed:</span><input type="number" id="bck_spd" value="100"></div>

                <button id="btn-connect" class="btn-success">Connect Motor</button>
                <button id="btn-begin" class="btn-success" disabled>Begin Sequence</button>
            </div>
        </div>

        <div class="panel">
            <h3>[ System_Logs ]</h3>
            <div id="terminal">System Ready...<br></div>
        </div>

    </div>

    <script>
        const listbox = document.getElementById('move-listbox');

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#move-listbox') && !e.target.closest('#btn-remove')) {
                document.querySelectorAll('.list-item.selected').forEach(el => el.classList.remove('selected'));
            }
        });

        listbox.addEventListener('click', (e) => {
            if (e.target.classList.contains('list-item')) {
                document.querySelectorAll('.list-item.selected').forEach(el => el.classList.remove('selected'));
                e.target.classList.add('selected');
            }
        });

        listbox.addEventListener('dragstart', (e) => {
            if(e.target.classList.contains('list-item')) {
                setTimeout(() => e.target.classList.add('dragging'), 0);
            }
        });

        listbox.addEventListener('dragend', (e) => {
            if(e.target.classList.contains('list-item')) {
                e.target.classList.remove('dragging');
            }
        });

        listbox.addEventListener('dragover', (e) => {
            e.preventDefault();
            const afterElement = getDragAfterElement(listbox, e.clientY);
            const currentDraggable = document.querySelector('.dragging');
            if (currentDraggable) {
                if (afterElement == null) {
                    listbox.appendChild(currentDraggable);
                } else {
                    listbox.insertBefore(currentDraggable, afterElement);
                }
            }
        });

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.list-item:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }
    </script>

    <script src="bluetooth.js"></script>
    <script type="py" src="app.py"></script>

</body>
</html>
